entities:
  User:
    label: ユーザー
    fields:
      id:
        type: id
        primary: true
      role:
        type: text
        required: true

  ExpenseRequest:
    label: 経費申請
    fields:
      id:
        type: id
        primary: true
      amount:
        type: money
        required: true
      reason:
        type: text
        required: true
      applicant:
        type: ref
        target: User
        required: true
      status:
        type: state
        initial: draft
      createdAt:
        type: datetime
        system: true
      updatedAt:
        type: datetime
        system: true
    relations:
      applicant:
        kind: many-to-one
        target: User
        field: applicant
    constraints:
      amountPositive:
        expr: amount > 0
    states:
      draft:
        label: 下書き
      submitted:
        label: 申請中
      approved:
        label: 承認済
      rejected:
        label: 却下
    transitions:
      submit:
        from: draft
        to: submitted
        input:
          - amount
          - reason
        guard: amount > 0
      approve:
        from: submitted
        to: approved
        role: manager
      reject:
        from: submitted
        to: rejected
        role: manager
        input:
          - rejectReason
        inputs:
          rejectReason:
            type: text
    rules:
      canApprove:
        when: state == "submitted" && user.role == "manager"
    views:
      draft:
        editable:
          - amount
          - reason
      submitted:
        readonly:
          - amount
          - reason
      approved:
        readonly:
          - amount
          - reason
      rejected:
        readonly:
          - amount
          - reason
    storage:
      table: expense_requests
      indexes:
        - fields: [status]
        - fields: [applicant, createdAt]
      unique:
        - fields: [applicant, createdAt]
      softDelete: true
