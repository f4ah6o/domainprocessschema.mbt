<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Schema Editor</title>
    <link rel="stylesheet" href="./editor/app.css" />
  </head>
  <body>
    <header class="topbar">
      <div>
        <h1>Schema Editor</h1>
        <p>Compile, inspect, preview, and export domain process schemas.</p>
      </div>
      <nav aria-label="Demo links">
        <a href="/demo/">Runtime demo</a>
        <a href="https://github.com/f4ah6o/domainprocessschema.mbt">GitHub</a>
      </nav>
    </header>

    <main class="app-shell">
      <section class="source-pane" aria-label="YAML source">
        <div class="pane-header">
          <h2>Source YAML</h2>
          <div class="button-row">
            <button id="format-source" type="button">Normalize</button>
            <button id="reset-source" type="button">Reset</button>
            <button id="compile-source" type="button">Compile</button>
          </div>
        </div>
        <textarea id="yaml-source" spellcheck="false"></textarea>
      </section>

      <section class="preview-pane" aria-label="Runtime preview">
        <div class="pane-header">
          <h2>Preview</h2>
          <label>
            <span>Scenario</span>
            <select id="preview-scenario">
              <option value="manifest">Manifest</option>
              <option value="draft">Draft</option>
              <option value="submitted">Submitted</option>
              <option value="submitted-manager" selected>Submitted manager</option>
              <option value="approved-manager">Approved manager</option>
              <option value="rejected-manager">Rejected manager</option>
            </select>
          </label>
        </div>
        <div id="status" role="status">Loading editor...</div>
        <iframe id="preview-frame" title="Schema runtime preview"></iframe>
      </section>

      <section class="artifact-pane" aria-label="Artifacts">
        <div class="pane-header">
          <h2>Artifacts</h2>
          <button id="download-artifact" type="button">Export JSON</button>
        </div>
        <div class="tabs" role="tablist" aria-label="Artifact views">
          <button class="tab active" data-artifact="sourceYaml" type="button">YAML</button>
          <button class="tab" data-artifact="normalizedSchema" type="button">Schema</button>
          <button class="tab" data-artifact="apiManifest" type="button">API</button>
          <button class="tab" data-artifact="validationManifest" type="button">Validation</button>
          <button class="tab" data-artifact="guiManifest" type="button">GUI</button>
          <button class="tab" data-artifact="runtimeSnapshot" type="button">Runtime</button>
          <button class="tab" data-artifact="diagnostics" type="button">Diagnostics</button>
        </div>
        <pre id="artifact-output"></pre>
      </section>
    </main>

    <script type="module" src="./main.js"></script>
  </body>
</html>
